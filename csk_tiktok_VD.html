<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSK TikTok Video Downloader - No Watermark</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0f0f1e 0%, #1a1a2f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 700px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 80px;
            margin-bottom: 10px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
        }

        h1 {
            background: linear-gradient(135deg, #00f2fe, #ff0050);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .subtitle {
            color: #888;
            font-size: 1.1em;
        }

        .input-section {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 30px;
        }

        .url-input-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .url-input {
            flex: 1;
            min-width: 250px;
            position: relative;
        }

        .url-input input {
            width: 100%;
            padding: 18px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            color: white;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .url-input input:focus {
            outline: none;
            border-color: #00f2fe;
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.3);
        }

        .url-input input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .download-btn {
            padding: 18px 35px;
            background: linear-gradient(135deg, #00f2fe, #ff0050);
            border: none;
            border-radius: 15px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            white-space: nowrap;
        }

        .download-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(255, 0, 80, 0.4);
        }

        .download-btn:active {
            transform: translateY(0);
        }

        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #00f2fe;
            border-right: 4px solid #ff0050;
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .result-section {
            display: none;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .video-info {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .video-thumbnail {
            flex: 0 0 200px;
        }

        .video-thumbnail img {
            width: 100%;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .video-details {
            flex: 1;
            min-width: 250px;
        }

        .video-title {
            color: white;
            font-size: 1.2em;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .video-meta {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            color: #888;
        }

        .video-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: white;
        }

        .download-now {
            background: linear-gradient(135deg, #00b09b, #96c93d);
        }

        .download-now:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 176, 155, 0.4);
        }

        .preview-btn {
            background: linear-gradient(135deg, #4a00e0, #8e2de2);
        }

        .preview-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(74, 0, 224, 0.4);
        }

        .error-message {
            background: rgba(255, 0, 80, 0.2);
            border: 1px solid #ff0050;
            color: #ff8a8a;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            font-size: 1.1em;
        }

        .examples {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 15px;
        }

        .examples h3 {
            color: #888;
            margin-bottom: 15px;
            font-size: 1em;
        }

        .example-links {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .example-link {
            color: #00f2fe;
            text-decoration: none;
            font-size: 0.9em;
            padding: 8px 15px;
            background: rgba(0, 242, 254, 0.1);
            border-radius: 20px;
            border: 1px solid rgba(0, 242, 254, 0.2);
            transition: all 0.3s ease;
        }

        .example-link:hover {
            background: rgba(0, 242, 254, 0.2);
            border-color: #00f2fe;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            color: #666;
            font-size: 0.9em;
        }

        .watermark-note {
            display: inline-block;
            padding: 5px 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            color: #888;
            font-size: 0.9em;
        }
        
        .csk-badge {
            background: rgba(255, 215, 0, 0.2);
            color: gold;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8em;
            display: inline-block;
            margin-top: 10px;
            border: 1px solid gold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🎥</div>
            <h1>CSK TikTok Video Downloader</h1>
            <div class="subtitle">Download any TikTok video without watermark</div>
            <div class="csk-badge">⚡ POWERED BY CSK ⚡</div>
        </div>

        <div class="input-section">
            <div class="url-input-group">
                <div class="url-input">
                    <input type="text" id="videoUrl" placeholder="Paste TikTok video link here... (e.g., https://www.tiktok.com/@username/video/123456789)">
                </div>
                <button class="download-btn" onclick="processVideo()">
                    <span>🔍</span> Get Video
                </button>
            </div>
        </div>

        <div class="loading" id="loading">
            <div class="loader"></div>
            <div style="color: #00f2fe;">Fetching your video...</div>
        </div>

        <div class="result-section" id="resultSection">
            <!-- Results will be displayed here -->
        </div>

        <div class="examples">
            <h3>📋 Try these examples:</h3>
            <div class="example-links">
                <a href="#" onclick="setExample('https://www.tiktok.com/@tiktok/video/7109762842485574958')" class="example-link">Example Video 1</a>
                <a href="#" onclick="setExample('https://www.tiktok.com/@tiktok/video/7106824884753567022')" class="example-link">Example Video 2</a>
                <a href="#" onclick="setExample('https://www.tiktok.com/@tiktok/video/7103296675535875374')" class="example-link">Example Video 3</a>
            </div>
        </div>

        <div class="footer">
            <span class="watermark-note">⚡ 100% Free • No Watermark • Fast Download • CSK SPECIAL ⚡</span>
        </div>
    </div>

    <script>
        // 👇 APKI RAPIDAPI KEY YAHAN SET HAI
        const RAPIDAPI_KEY = '7bcdcc2e0cmsh699d4f1597cd552p1b5062jsneec3de7c005a';
        
        // Multiple API endpoints for better reliability
        const APIS = [
            'https://www.tikwm.com/api/',
            'https://api.tokmate.app/api',
            {
                url: 'https://tiktok-video-no-watermark-download.p.rapidapi.com/',
                useRapidAPI: true,
                host: 'tiktok-video-no-watermark-download.p.rapidapi.com'
            }
        ];

        async function processVideo() {
            const url = document.getElementById('videoUrl').value.trim();
            
            if (!url) {
                alert('Please enter a TikTok video URL');
                return;
            }

            // Validate TikTok URL
            if (!url.includes('tiktok.com')) {
                showError('Please enter a valid TikTok URL');
                return;
            }

            // Show loading
            document.getElementById('loading').style.display = 'block';
            document.getElementById('resultSection').style.display = 'none';

            try {
                // Try multiple APIs
                let videoData = null;
                
                // Method 1: TikWM API (Most reliable)
                try {
                    const response = await fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(url)}`);
                    const data = await response.json();
                    
                    if (data.code === 0) {
                        videoData = {
                            title: data.data.title,
                            play: data.data.play,
                            wmplay: data.data.wmplay,
                            music: data.data.music,
                            cover: data.data.cover,
                            duration: data.data.duration,
                            author: data.data.author?.unique_id || 'tiktok_user',
                            views: data.data.play_count || 'N/A',
                            likes: data.data.digg_count || 'N/A'
                        };
                    }
                } catch (e) {
                    console.log('TikWM API failed, trying next...');
                }

                // Method 2: Alternative API if first fails
                if (!videoData) {
                    try {
                        const response = await fetch(`https://api.tokmate.app/api?url=${encodeURIComponent(url)}`);
                        const data = await response.json();
                        
                        if (data.success) {
                            videoData = {
                                title: data.title || 'TikTok Video',
                                play: data.video_no_watermark,
                                wmplay: data.video_watermark,
                                cover: data.thumbnail,
                                duration: data.duration || '0',
                                author: data.author || 'tiktok_user',
                                views: data.views || 'N/A',
                                likes: data.likes || 'N/A'
                            };
                        }
                    } catch (e) {
                        console.log('Second API failed');
                    }
                }

                // Method 3: RapidAPI (with your key)
                if (!videoData) {
                    try {
                        const options = {
                            method: 'GET',
                            headers: {
                                'X-RapidAPI-Key': RAPIDAPI_KEY,  // 👈 APNI KEY USE HO RAHI HAI
                                'X-RapidAPI-Host': 'tiktok-video-no-watermark-download.p.rapidapi.com'
                            }
                        };
                        
                        const response = await fetch(`https://tiktok-video-no-watermark-download.p.rapidapi.com/?url=${encodeURIComponent(url)}`, options);
                        const data = await response.json();
                        
                        if (data && data.data) {
                            videoData = {
                                title: data.data.title || 'TikTok Video',
                                play: data.data.play || data.data.video_url,
                                cover: data.data.cover,
                                duration: data.data.duration || '0',
                                author: data.data.author || 'tiktok_user',
                                views: data.data.play_count || 'N/A',
                                likes: data.data.digg_count || 'N/A'
                            };
                        }
                    } catch (e) {
                        console.log('RapidAPI failed', e);
                    }
                }

                // Hide loading
                document.getElementById('loading').style.display = 'none';

                if (videoData) {
                    displayResult(videoData);
                } else {
                    showError('Could not fetch video. Please try again or try a different video.');
                }

            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                showError('Error: ' + error.message);
            }
        }

        function displayResult(data) {
            const resultSection = document.getElementById('resultSection');
            
            // Format numbers
            const formatNumber = (num) => {
                if (num === 'N/A') return num;
                if (num > 1000000) return (num/1000000).toFixed(1) + 'M';
                if (num > 1000) return (num/1000).toFixed(1) + 'K';
                return num;
            };

            // Create video URL (if it's a relative path, make it absolute)
            let videoUrl = data.play;
            if (videoUrl && !videoUrl.startsWith('http')) {
                videoUrl = 'https://www.tikwm.com' + videoUrl;
            }

            // Create download function
            const downloadVideo = (url, filename) => {
                fetch(url)
                    .then(response => response.blob())
                    .then(blob => {
                        const blobUrl = window.URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = blobUrl;
                        a.download = filename || 'tiktok_video.mp4';
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        window.URL.revokeObjectURL(blobUrl);
                    })
                    .catch(() => {
                        // Fallback to direct download
                        window.open(url, '_blank');
                    });
            };

            resultSection.innerHTML = `
                <div class="video-info">
                    <div class="video-thumbnail">
                        <img src="${data.cover || 'https://via.placeholder.com/200x350'}" alt="Thumbnail">
                    </div>
                    <div class="video-details">
                        <div class="video-title">
                            ${data.title || 'TikTok Video'}
                        </div>
                        <div class="video-meta">
                            <span>👤 @${data.author}</span>
                            <span>👁️ ${formatNumber(data.views)}</span>
                            <span>❤️ ${formatNumber(data.likes)}</span>
                            <span>⏱️ ${data.duration}s</span>
                        </div>
                        <div class="action-buttons">
                            <button class="action-btn download-now" onclick="downloadVideo('${videoUrl}', 'CSK_TikTok_${data.author}.mp4')">
                                ⬇️ Download (No Watermark)
                            </button>
                            <button class="action-btn preview-btn" onclick="window.open('${videoUrl}', '_blank')">
                                👁️ Preview Video
                            </button>
                        </div>
                        ${data.music ? `
                        <div style="margin-top: 15px;">
                            <button class="action-btn download-now" style="background: linear-gradient(135deg, #667eea, #764ba2);" onclick="downloadVideo('${data.music}', 'CSK_TikTok_Audio.mp3')">
                                🎵 Download Audio
                            </button>
                        </div>
                        ` : ''}
                        <div style="margin-top: 15px; text-align: center; color: gold; font-size: 0.8em;">
                            ⚡ CSK TikTok Downloader ⚡
                        </div>
                    </div>
                </div>
            `;
            
            resultSection.style.display = 'block';
        }

        function showError(message) {
            const resultSection = document.getElementById('resultSection');
            resultSection.innerHTML = `
                <div class="error-message">
                    ❌ ${message}
                    <div style="margin-top: 15px; color: gold; font-size: 0.8em;">
                        ⚡ CSK TikTok Downloader ⚡
                    </div>
                </div>
            `;
            resultSection.style.display = 'block';
        }

        function setExample(url) {
            document.getElementById('videoUrl').value = url;
            processVideo();
        }

        // Global download function
        window.downloadVideo = function(url, filename) {
            fetch(url)
                .then(response => response.blob())
                .then(blob => {
                    const blobUrl = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = blobUrl;
                    a.download = filename;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(blobUrl);
                })
                .catch(() => {
                    window.open(url, '_blank');
                });
        };
    </script>
</body>
</html>
